<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Jovenes</title>
    <style>
        :root {
            --whatsapp-green: #25d366;
            --dark-green: #075e54;
            --bg-color: #e5ddd5;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px;
        }

        h2 { color: var(--dark-green); text-align: center; margin-top: 0; margin-bottom: 20px; }
        
        label { 
            font-size: 14px; 
            color: #444; 
            font-weight: 600; 
            display: block; 
            margin-bottom: 5px; 
        }
        
        .fila-input { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
        }

        .ancho-tipo { width: 90px; flex-shrink: 0; } 
        .flex-relleno { flex: 1; } 

        input, select { 
            height: 48px; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box;
            width: 100%;
        }

        .margin-b { margin-bottom: 15px; }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: var(--whatsapp-green); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 10px;
        }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registro de niños(as) y jovenes</h2>
        <form id="formRegistro">
            <label>Nombre del Tutor</label>
            <input type="text" id="tutor" class="margin-b" placeholder="Nombre completo" required>
            
            <label>Identificación</label>
            <div class="fila-input">
                <select id="tipo_doc" class="ancho-tipo" required>
                    <option value="CC">CC</option>
                    <option value="TI">TI</option>
                    <option value="CE">CE</option>
                </select>
                <input type="text" id="doc_tutor" class="flex-relleno" placeholder="Número de documento" required>
            </div>

            <label>Teléfono del Tutor</label>
            <input type="tel" id="tel_tutor" class="margin-b" placeholder="Número de celular" required>
            
            <hr>
            
            <label>Datos del joven</label>
            <input type="text" id="infante" class="margin-b" placeholder="Nombre completo del joven" required>
            
            <div class="fila-input">
                <div class="flex-relleno">
                    <label>Edad</label>
                    <input type="number" id="edad" min="0" max="17" required>
                </div>
                <div class="flex-relleno">
                    <label>Sexo</label>
                    <select id="sexo" required>
                        <option value="" disabled selected>Elegir...</option>
                        <option value="Niño">Niño</option>
                        <option value="Niña">Niña</option>
                    </select>
                </div>
            </div>
            
            <button type="button" onclick="enviarAWhatsApp()">ENVIAR REGISTRO</button>
        </form>
    </div>

    <script>
        function enviarAWhatsApp() {
            const telefonoPersonaY = "573204230973"; 

            const tutor = document.getElementById('tutor').value;
            const tipoDoc = document.getElementById('tipo_doc').value;
            const docTutor = document.getElementById('doc_tutor').value;
            const telTutor = document.getElementById('tel_tutor').value;
            const infante = document.getElementById('infante').value;
            const edad = document.getElementById('edad').value;
            const sexo = document.getElementById('sexo').value;

            if(!tutor || !docTutor || !telTutor || !infante || !edad || !sexo) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            const mensaje = `*NUEVO REGISTRO*%0A` +
                            `*Tutor:* ${tutor}%0A` +
                            `*ID:* ${tipoDoc} ${docTutor}%0A` +
                            `*Tel:* ${telTutor}%0A` +
                            `*niño(a):* ${infante}%0A` +
                            `*Edad:* ${edad} años%0A` +
                            `*Sexo:* ${sexo}`;

            window.location.href = `https://wa.me/${telefonoPersonaY}?text=${mensaje}`;
        }
    </script>
</body>
</html>
